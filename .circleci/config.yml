workflows:
  version: 2
  "deploy":
    jobs:
      - environment
      # - supabase:
      #     requires:
      #       - environment
      #     filters:
      #       branches:
      #         only:
      #           - main
      #           - develop
      - dev:
          requires:
            - environment
          filters:
            branches:
              only:
                - develop
      - build:
          requires:
            - environment
          filters:
            branches:
              only:
                - main
